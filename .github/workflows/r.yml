name: R-analysis

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install basic packages
        run: |
          Rscript -e 'install.packages(c("remotes", "dplyr", "ggplot2"), repos="https://cloud.r-project.org")'

      - name: Run test script
        run: |
          Rscript analysis.R
